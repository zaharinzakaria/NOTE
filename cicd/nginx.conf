# Serve the SPA: static files with a fallback to index.html for client-side routes.
# /api is routed to the backend by the Ingress, so it never reaches nginx.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
